# @package _global_
dataset:
  # Train split: used by train.py with split_train_val (hold-out val for training curves).
  train_dir: /Data/paul.chiche/train
  # Full validation split: used by evaluate.py (no random split; entire folder).
  val_dir: /Data/paul.chiche/val
  # Test frames root for create_submission.py
  test_dir: /Data/paul.chiche/test
  submission_output: /Data/paul.chiche/submission.csv

  num_frames: 8
  val_ratio: 0.2
  seed: 42
  max_samples: null