# @package _global_
# Personal config for Vianney - uses alternative data location
# Usage: python train.py +data=vianney

dataset:
  # Train split: used by train.py with split_train_val (hold-out val for training curves).
  train_dir: /Data/vianney.gauthier/processed_data/train
  # Full validation split: used by evaluate.py (no random split; entire folder).
  val_dir: /Data/vianney.gauthier/processed_data/val
  # Test frames root for create_submission.py
  test_dir: /Data/vianney.gauthier/processed_data/test
  submission_output: /Data/vianney.gauthier/processed_data/submission.csv

  num_frames: 8
  val_ratio: 0.2
  seed: 42
  max_samples: null
